<style>
    @font-face {
		font-family: Geo;
		src:url("Georgia.ttf")
	}
	@font-face{
		font-family: Ops;
		src:url("BlackOpsOne-Regular.ttf")
	} * {
        margin: 0;
        padding: 0;
    } body {
        background: whitesmoke;
		min-height: 100vh;
        position: relative;
    } #page {
        width: 1024px;
        height: 1525px;
        background: white;
        border: 1px solid darkgray;
        box-shadow: 2px 3px 6px darkgray;
        margin: 24px auto;
    } #textbox {
        width: 768px;
        height: 768px;
        margin: 48px auto;
        border: 1px dashed gray;
    } #banner {
        width: 1024px;
    } h1 {
        font: 48pt/1.4em Ops;
        text-align: center;
        margin: 0 0 10px 0;
        color: #89cdc6;
        text-shadow: 2px 3px 6px #e12885;
	} p {
        font: 14pt/1.4em Geo;
        width: 768px;
        margin: 24px auto;
        padding-bottom: 50px;
	 } ul {
        width: 100%;
	}li {
        font: 14pt/2.0em Geo;
        list-style: none;
        text-align: center;
        background: #39C5BB;
		height: 40px;
		width: 20%;
		float:left;
    } a li {
        color: black;
		text-decoration: none;
    } a {
        text-decoration: none;
    } li:hover, a li:hover {
        background: #39FFD5;
	} ul li ul li {
        visibility: hidden;
        width: 100%;
        float: none;
    } ul li:hover li {
        visibility: visible;
	} form {
        width: 600px;
        min-height: 600px;
        padding: 24px;
        background: whitesmoke;
        margin: 36px auto;
        border: 2px solid #e12885;
        box-shadow: 2px 3px 6px #e12885;
        border-radius: 18px;
        font: 14pt/1.2em Geo;
		margin-top: 150px;
    } input {
        margin-bottom: 6px;
    } input[type=text] {
        width: 100%;
		height: 20px;
	}input[type=submit]:hover{
		background: #39FFD5;
    } input[type=submit] {
        width: 125px;
        height: 40px;
        margin: 24px auto 0 auto;
        display: block;
        background: #39C5BB;
        border-radius: 6px;
		font: 14px Geo;
    } fieldset {
        margin-top: 18px;
    } #personal input, #submit {
        width: 100%;
        height: 24px;
        margin-bottom: 12px;
    } figcaption {
		font: 14pt/1.4em Geo;
		text-align: center;
	}
</style>
</head>
