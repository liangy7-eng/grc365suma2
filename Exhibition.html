		height: 40px;
		width: 20%;
		float:left;
    } a li {
        color: black;
		text-decoration: none;
    } a {
        text-decoration: none;
    } li:hover, a li:hover {
        background: #39FFD5;
	} ul li ul li {
        visibility: hidden;
        width: 100%;
        float: none;
    } ul li:hover li {
        visibility: visible;
    } img:not(#banner):hover {
        transform: scale(1.03);
        transition: transform 0.5s;
    } .zoom:hover {
        background-size: 105%;
        transition: background-size 0.5s;
	}
</style>
