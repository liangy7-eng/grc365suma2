	@font-face{
		font-family: Ops;
		src:url("BlackOpsOne-Regular.ttf")
	} * {
        margin: 0;
        padding: 0;
    } body {
        background: whitesmoke;
		min-height: 100vh;
        position: relative;
    } #page {
        width: 1024px;
        height: 1525px;

        border: 1px solid darkgray;

        margin: 24px auto;
    } #banner {

        font: 48pt/1.4em Ops;
        text-align: center;
        margin: 120px 0 0 0;
        color: #89cdc6;
        text-shadow: 2px 3px 6px #e12885;
    } p {
        font: 14pt/1.4em Geo;
        width: 768px;
        margin: 24px auto;
        padding-bottom: 175px;
	 } ul {
        width: 100%;
	}li {
        font: 14pt/2.0em Geo;
        list-style: none;
        text-align: center;
        background: #39C5BB;
		height: 40px;
		width: 20%;
		float:left;
    } a li {
        color: black;
		text-decoration: none;
    } a {
        text-decoration: none;
    } li:hover, a li:hover {
        background: #39FFD5;
	} ul li ul li {
        visibility: hidden;
        width: 100%;
        float: none;
    } ul li:hover li {
        visibility: visible;
	} main {
        width: 768px;
        height: 768px;
        margin: 10px auto;
        // border: 1px dashed gray;
        display: grid;
        grid-gap: 1px;
        grid-template: repeat(3,256px) / repeat(2,384px);
	} figcaption {
		font: 14pt/1.4em Geo;
		text-align: center;
	    margin: 30px 0 0 0;
	} main img {
        width: 384px;
    } main img:nth-child(1) {
        grid-area: 1/1/2/2;
    } main img:nth-child(2) {
        grid-area: 2/1/3/2;
    } main img:nth-child(3) {
        grid-area: 3/1/4/2;
    } main img:nth-child(4) {
        grid-area: 1/2/2/4;
    } main p {
        font: 14pt/1.4em Geo, serif;
        margin-bottom: 12px;
	}
</style>
